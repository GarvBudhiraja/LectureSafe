<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LectureSafe - Attendance Calculator</title>
  <meta name="description" content="LectureSafe is a private attendance calculator for students." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="mobileBackdrop" class="mobile-backdrop"></div>

  <header class="topbar">
    <nav class="nav-card">
      <a href="#" class="brand">LectureSafe</a>
      <div class="nav-actions">
        <button id="themeToggle" class="theme-btn">☀️ Light</button>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero-section">
      <h1 class="hero-title">LectureSafe</h1>
      <p class="hero-subtitle">Private Attendance Calculator</p>
    </section>

    <section id="calculator" class="calculator-section">
      <div id="calculatorShell" class="calculator-shell">
        
        <form id="attendanceForm" class="form-card" novalidate>
          <div class="input-group">
            <label for="requiredPercentage">Target Percentage (%)</label>
            <input id="requiredPercentage" type="number" placeholder="Example: 75" />
          </div>

          <div class="input-group">
            <label for="totalHeld">Total Classes Held</label>
            <input id="totalHeld" type="number" placeholder="Example: 20" />
          </div>

          <div class="input-group">
            <label for="attended">Classes Attended</label>
            <input id="attended" type="number" placeholder="Example: 18" />
          </div>

          <div id="errorBox" class="error-box" style="display: none; color: red; margin-bottom: 10px;"></div>

          <div class="button-row">
            <button id="calculateBtn" class="calculate-btn" type="submit">Calculate Result</button>
            <button id="resetBtn" class="reset-btn" type="button">Reset</button>
          </div>
        </form>

        <section id="resultCard" class="result-card waiting">
          <div class="drag-handle"></div> 
          
          <div class="card-heading">
            <h3>Result Summary</h3>
            <span id="zoneBadge" class="zone-badge">Ready</span>
          </div>

          <div class="main-result">
            <span>Current Attendance</span>
            <strong id="currentAttendance">--%</strong>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <span>Classes Missed</span>
              <strong id="missedClasses">--</strong>
            </div>
            <div class="stat-card">
              <span>Safe Misses</span>
              <strong id="safeMisses">--</strong>
            </div>
            <div class="stat-card wide">
              <span>Classes Needed</span>
              <strong id="neededClasses">--</strong>
            </div>
          </div>
          
          <button id="closeSheetBtn" class="close-sheet-btn" type="button">Close Result</button>
        </section>

      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
